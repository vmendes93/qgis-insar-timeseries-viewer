name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test tools
        run: python -m pip install --upgrade pip pytest ruff "numpy<3" "matplotlib<4"

      - name: Lint critical Python errors
        run: python -m ruff check insar_timeseries_viewer tests scripts

      - name: Compile Python source
        run: python -m compileall -q insar_timeseries_viewer scripts tests

      - name: Run unit tests
        run: python -m pytest tests/unit

      - name: Validate public release structure
        run: python scripts/validate_release.py

  package:
    name: Build installable plugin
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate and package
        run: |
          python scripts/validate_release.py
          python scripts/package_plugin.py

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: insar-timeseries-viewer
          path: dist/*
          if-no-files-found: error
